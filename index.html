<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Digest</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #fafafa;
      --surface: #fff;
      --surface2: #f5f5f5;
      --border: #e0e0e0;
      --text: #222;
      --text2: #888;
      --accent: #1a73e8;
      --accent-bg: #e8f0fe;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    /* 헤더 */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
    }
    header h1 { font-size: 20px; font-weight: 700; }

    /* 레이아웃 */
    .layout {
      display: flex;
      max-width: 1100px;
      margin: 0 auto;
      min-height: calc(100vh - 57px);
    }

    /* 사이드바 */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px 0;
      overflow-y: auto;
    }
    .nav-section { margin-bottom: 4px; }
    .nav-main {
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-main:hover { background: var(--surface2); }
    .nav-category {
      padding: 8px 20px 8px 32px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-category:hover { background: var(--surface2); color: var(--text); }
    .nav-channel {
      padding: 7px 20px 7px 48px;
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
      border-left: 3px solid transparent;
    }
    .nav-channel:hover { background: var(--surface2); color: var(--text); }
    .nav-channel.active {
      color: var(--accent);
      background: var(--accent-bg);
      border-left-color: var(--accent);
      font-weight: 600;
    }
    .nav-count {
      font-size: 11px;
      color: var(--text2);
      background: var(--surface2);
      padding: 1px 6px;
      border-radius: 10px;
      margin-left: auto;
    }
    .nav-channel.active .nav-count { background: #c5daf7; color: var(--accent); }
    .nav-toggle {
      font-size: 10px;
      color: var(--text2);
      transition: transform 0.2s;
    }
    .nav-section.collapsed .nav-toggle { transform: rotate(-90deg); }
    .nav-section.collapsed .nav-sub { display: none; }

    /* 컨텐츠 */
    .content {
      flex: 1;
      padding: 24px;
      min-width: 0;
    }
    .content-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .content-title { font-size: 18px; font-weight: 700; }
    .content-count { font-size: 13px; color: var(--text2); }

    /* 날짜 그룹 */
    .date-group { margin-bottom: 24px; }
    .date-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }

    /* 포스트 카드 */
    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .post-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .post-header {
      padding: 14px 18px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .post-title { font-size: 15px; font-weight: 600; line-height: 1.4; }
    .post-meta { font-size: 12px; color: var(--text2); margin-top: 3px; }
    .post-toggle {
      color: var(--accent);
      font-size: 12px;
      flex-shrink: 0;
      margin-left: 12px;
      font-weight: 500;
    }
    .post-body {
      display: none;
      padding: 0 18px 18px;
      font-size: 14px;
      line-height: 1.9;
      white-space: pre-wrap;
      color: #444;
    }
    .post-body.open { display: block; }
    .post-link {
      display: inline-block;
      margin-top: 12px;
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }
    .post-link:hover { text-decoration: underline; }
    .empty { text-align: center; padding: 60px 20px; color: var(--text2); font-size: 15px; }

    /* 모바일 */
    .sidebar-toggle { display: none; }
    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: none;
        overflow: visible;
      }
      .sidebar.mobile-hidden .nav-sub,
      .sidebar.mobile-hidden .nav-category,
      .sidebar.mobile-hidden .nav-channel { display: none; }
      .sidebar-toggle {
        display: block;
        padding: 10px 20px;
        font-size: 13px;
        color: var(--accent);
        cursor: pointer;
        text-align: center;
      }
      .content { padding: 16px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Daily Digest</h1>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="content" id="content">
    <div class="empty">로딩 중...</div>
  </main>
</div>

<script>
  let allPosts = [];
  let currentChannel = '';

  async function init() {
    const res = await fetch('posts/index.json');
    if (!res.ok) {
      document.getElementById('content').innerHTML = '<div class="empty">아직 요약된 글이 없습니다.</div>';
      return;
    }
    allPosts = await res.json();
    if (allPosts.length === 0) {
      document.getElementById('content').innerHTML = '<div class="empty">아직 요약된 글이 없습니다.</div>';
      return;
    }

    buildSidebar();

    // 첫 채널 자동 선택
    const firstChannel = document.querySelector('.nav-channel');
    if (firstChannel) selectChannel(firstChannel.dataset.ch);
  }

  function buildSidebar() {
    const sidebar = document.getElementById('sidebar');

    // 구조: 유튜브 > category > channel
    // category별 채널 그룹핑
    const catMap = {};
    for (const p of allPosts) {
      const cat = p.category || '기타';
      const ch = p.channelName;
      if (!catMap[cat]) catMap[cat] = {};
      if (!catMap[cat][ch]) catMap[cat][ch] = 0;
      catMap[cat][ch]++;
    }

    let html = '';
    html += `<div class="nav-section">`;
    html += `<div class="nav-main">유튜브</div>`;
    html += `<div class="nav-sub">`;

    for (const [cat, channels] of Object.entries(catMap)) {
      const catTotal = Object.values(channels).reduce((a, b) => a + b, 0);
      html += `<div class="nav-section">`;
      html += `<div class="nav-category" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="nav-toggle">▼</span> ${esc(cat)}
        <span class="nav-count">${catTotal}</span>
      </div>`;
      html += `<div class="nav-sub">`;
      for (const [ch, count] of Object.entries(channels)) {
        html += `<div class="nav-channel" data-ch="${esc(ch)}" onclick="selectChannel('${escAttr(ch)}')">
          ${esc(ch)} <span class="nav-count">${count}</span>
        </div>`;
      }
      html += `</div></div>`;
    }

    html += `</div></div>`;

    // 모바일 토글
    html += `<div class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('mobile-hidden')">메뉴 접기/펼치기</div>`;

    sidebar.innerHTML = html;
  }

  function selectChannel(ch) {
    currentChannel = ch;

    // 활성 상태 업데이트
    document.querySelectorAll('.nav-channel').forEach(el => {
      el.classList.toggle('active', el.dataset.ch === ch);
    });

    const posts = allPosts.filter(p => p.channelName === ch);
    renderPosts(ch, posts);

    // 모바일에서 사이드바 접기
    if (window.innerWidth <= 768) {
      document.getElementById('sidebar').classList.add('mobile-hidden');
    }
  }

  function renderPosts(channelName, posts) {
    const content = document.getElementById('content');

    if (posts.length === 0) {
      content.innerHTML = `
        <div class="content-header"><div class="content-title">${esc(channelName)}</div></div>
        <div class="empty">요약된 글이 없습니다.</div>`;
      return;
    }

    // 날짜별 그룹핑
    const grouped = {};
    for (const p of posts) {
      const date = p.date || '날짜 없음';
      if (!grouped[date]) grouped[date] = [];
      grouped[date].push(p);
    }

    const dates = Object.keys(grouped).sort().reverse();
    let html = `
      <div class="content-header">
        <div class="content-title">${esc(channelName)}</div>
        <div class="content-count">${posts.length}건</div>
      </div>`;

    for (const date of dates) {
      html += `<div class="date-group">`;
      html += `<div class="date-title">${date}</div>`;
      for (const p of grouped[date]) {
        html += `
          <div class="post-card">
            <div class="post-header" onclick="togglePost(this)">
              <div>
                <div class="post-title">${esc(p.title)}</div>
                <div class="post-meta">${p.date}</div>
              </div>
              <span class="post-toggle">펼치기</span>
            </div>
            <div class="post-body">${esc(p.summary)}

<a class="post-link" href="${esc(p.link)}" target="_blank">YouTube에서 보기 →</a></div>
          </div>`;
      }
      html += `</div>`;
    }
    content.innerHTML = html;
  }

  function togglePost(header) {
    const body = header.nextElementSibling;
    body.classList.toggle('open');
    header.querySelector('.post-toggle').textContent = body.classList.contains('open') ? '접기' : '펼치기';
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function escAttr(str) {
    return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }

  init();
</script>
</body>
</html>
