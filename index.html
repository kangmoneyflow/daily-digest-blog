<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Digest</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #fafafa;
      --surface: #fff;
      --surface2: #f5f5f5;
      --border: #e0e0e0;
      --text: #222;
      --text2: #888;
      --accent: #1a73e8;
      --accent-bg: #e8f0fe;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
    }
    header h1 { font-size: 20px; font-weight: 700; }

    .layout { display: flex; max-width: 1100px; margin: 0 auto; min-height: calc(100vh - 57px); }

    /* 사이드바 */
    .sidebar {
      width: 250px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 12px 0;
      overflow-y: auto;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .nav-item {
      padding: 9px 16px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.15s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { background: var(--surface2); }
    .nav-item.active { color: var(--accent); background: var(--accent-bg); border-left-color: var(--accent); font-weight: 600; }
    .nav-item .nav-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; text-align: left; }
    .nav-count {
      font-size: 11px;
      color: var(--text2);
      background: var(--surface2);
      padding: 1px 7px;
      border-radius: 10px;
      flex-shrink: 0;
      margin-left: 8px;
    }
    .nav-item.active .nav-count { background: #c5daf7; color: var(--accent); }

    /* 레벨별 들여쓰기 */
    .nav-lv0 { font-size: 15px; font-weight: 700; padding: 12px 16px; color: var(--text); }
    .nav-lv1 { padding-left: 28px; font-weight: 600; color: #555; }
    .nav-lv2 { padding-left: 44px; color: var(--text2); }

    .nav-toggle {
      font-size: 10px;
      color: var(--text2);
      margin-right: 6px;
      transition: transform 0.2s;
      display: inline-block;
    }
    .nav-toggle.collapsed { transform: rotate(-90deg); }
    .nav-section { overflow: hidden; }

    /* 컨텐츠 */
    .content { flex: 1; padding: 24px; min-width: 0; }
    .content-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--accent);
    }
    .content-title { font-size: 18px; font-weight: 700; }
    .content-count { font-size: 13px; color: var(--text2); }
    .content-breadcrumb { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
    .content-breadcrumb span { cursor: pointer; color: var(--accent); }
    .content-breadcrumb span:hover { text-decoration: underline; }

    /* 날짜 그룹 */
    .date-group { margin-bottom: 20px; }
    .date-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      padding: 6px 0;
      margin-bottom: 8px;
    }

    /* 포스트 카드 */
    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .post-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .post-header {
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .post-title { font-size: 14px; font-weight: 600; line-height: 1.4; }
    .post-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .post-toggle { color: var(--accent); font-size: 12px; flex-shrink: 0; margin-left: 12px; font-weight: 500; }
    .post-body {
      display: none;
      padding: 0 16px 16px;
      font-size: 14px;
      line-height: 1.9;
      white-space: pre-wrap;
      color: #444;
    }
    .post-body.open { display: block; }
    .post-link {
      display: inline-block;
      margin-top: 12px;
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }
    .post-link:hover { text-decoration: underline; }
    .empty { text-align: center; padding: 60px 20px; color: var(--text2); font-size: 15px; }

    /* 모바일 */
    .mobile-nav-toggle { display: none; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; font-size: 14px; color: var(--accent); cursor: pointer; font-weight: 600; }
    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border); }
      .sidebar.hidden { display: none; }
      .mobile-nav-toggle { display: block; }
      .content { padding: 16px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Daily Digest</h1>
</header>
<div class="mobile-nav-toggle" onclick="document.getElementById('sidebar').classList.toggle('hidden')">메뉴</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="content" id="content">
    <div class="empty">로딩 중...</div>
  </main>
</div>

<script>
  let allPosts = [];
  let currentFilter = { level: 'all', category: '', channel: '' };

  async function init() {
    const res = await fetch('posts/index.json');
    if (!res.ok) {
      showEmpty();
      return;
    }
    allPosts = await res.json();
    if (allPosts.length === 0) {
      showEmpty();
      return;
    }

    buildSidebar();
    // 기본: 전체 보기
    navigate('all', '', '');
  }

  function showEmpty() {
    document.getElementById('content').innerHTML = '<div class="empty">아직 요약된 글이 없습니다.</div>';
    document.getElementById('sidebar').innerHTML = '';
  }

  function buildSidebar() {
    // 구조 수집: category > channel > count
    const catMap = {};
    let totalCount = 0;
    for (const p of allPosts) {
      const cat = p.category || '기타';
      const ch = p.channelName;
      if (!catMap[cat]) catMap[cat] = {};
      if (!catMap[cat][ch]) catMap[cat][ch] = 0;
      catMap[cat][ch]++;
      totalCount++;
    }

    let html = '';

    // 유튜브 (전체)
    html += `<div class="nav-item nav-lv0" data-level="all" data-cat="" data-ch="" onclick="navigate('all','','')">
      <span class="nav-toggle" onclick="event.stopPropagation();toggleSection('yt-all')">▼</span>
      <span class="nav-label">유튜브</span>
      <span class="nav-count">${totalCount}</span>
    </div>`;
    html += `<div class="nav-section" id="yt-all">`;

    for (const [cat, channels] of Object.entries(catMap)) {
      const catTotal = Object.values(channels).reduce((a, b) => a + b, 0);
      const catId = 'cat-' + cat.replace(/\s/g, '_');

      // 카테고리
      html += `<div class="nav-item nav-lv1" data-level="category" data-cat="${esc(cat)}" data-ch="" onclick="navigate('category','${escQ(cat)}','')">
        <span class="nav-toggle" onclick="event.stopPropagation();toggleSection('${catId}')">▼</span>
        <span class="nav-label">${esc(cat)}</span>
        <span class="nav-count">${catTotal}</span>
      </div>`;

      // 채널 그룹
      html += `<div class="nav-section" id="${catId}">`;
      for (const [ch, count] of Object.entries(channels)) {
        html += `<div class="nav-item nav-lv2" data-level="channel" data-cat="${esc(cat)}" data-ch="${esc(ch)}" onclick="navigate('channel','${escQ(cat)}','${escQ(ch)}')">
          <span class="nav-label">${esc(ch)}</span>
          <span class="nav-count">${count}</span>
        </div>`;
      }
      html += `</div>`;
    }

    html += `</div>`;
    document.getElementById('sidebar').innerHTML = html;
  }

  function navigate(level, category, channel) {
    currentFilter = { level, category, channel };

    // 사이드바 활성 표시
    document.querySelectorAll('.nav-item').forEach(el => {
      const match =
        (level === 'all' && el.dataset.level === 'all') ||
        (level === 'category' && el.dataset.level === 'category' && el.dataset.cat === category) ||
        (level === 'channel' && el.dataset.level === 'channel' && el.dataset.ch === channel);
      el.classList.toggle('active', match);
    });

    // 필터링
    let posts = allPosts;
    let title = '유튜브';
    let breadcrumb = '';

    if (level === 'category') {
      posts = allPosts.filter(p => (p.category || '기타') === category);
      title = category;
      breadcrumb = `<span onclick="navigate('all','','')">유튜브</span> &gt; ${esc(category)}`;
    } else if (level === 'channel') {
      posts = allPosts.filter(p => p.channelName === channel);
      title = channel;
      breadcrumb = `<span onclick="navigate('all','','')">유튜브</span> &gt; <span onclick="navigate('category','${escQ(category)}','')">${esc(category)}</span> &gt; ${esc(channel)}`;
    }

    renderPosts(title, posts, breadcrumb);

    // 모바일 사이드바 닫기
    if (window.innerWidth <= 768) {
      document.getElementById('sidebar').classList.add('hidden');
    }
  }

  function renderPosts(title, posts, breadcrumb) {
    const content = document.getElementById('content');

    if (posts.length === 0) {
      content.innerHTML = `
        ${breadcrumb ? `<div class="content-breadcrumb">${breadcrumb}</div>` : ''}
        <div class="content-header"><div class="content-title">${esc(title)}</div></div>
        <div class="empty">요약된 글이 없습니다.</div>`;
      return;
    }

    // 날짜별 그룹핑 (최신순)
    const grouped = {};
    for (const p of posts) {
      const date = p.date || '날짜 없음';
      if (!grouped[date]) grouped[date] = [];
      grouped[date].push(p);
    }
    const dates = Object.keys(grouped).sort().reverse();

    let html = '';
    if (breadcrumb) html += `<div class="content-breadcrumb">${breadcrumb}</div>`;
    html += `<div class="content-header">
      <div class="content-title">${esc(title)}</div>
      <div class="content-count">${posts.length}건</div>
    </div>`;

    for (const date of dates) {
      html += `<div class="date-group">`;
      html += `<div class="date-title">${date} (${grouped[date].length}건)</div>`;
      for (const p of grouped[date]) {
        const showChannel = currentFilter.level !== 'channel';
        html += `
          <div class="post-card">
            <div class="post-header" onclick="togglePost(this)">
              <div>
                <div class="post-title">${esc(p.title)}</div>
                <div class="post-meta">${showChannel ? esc(p.channelName) + ' · ' : ''}${p.date}</div>
              </div>
              <span class="post-toggle">펼치기</span>
            </div>
            <div class="post-body">${esc(p.summary)}

<a class="post-link" href="${esc(p.link)}" target="_blank">YouTube에서 보기 →</a></div>
          </div>`;
      }
      html += `</div>`;
    }
    content.innerHTML = html;
  }

  function toggleSection(id) {
    const section = document.getElementById(id);
    if (!section) return;
    const hidden = section.style.display === 'none';
    section.style.display = hidden ? '' : 'none';
    // 토글 아이콘 업데이트
    const toggle = section.previousElementSibling?.querySelector('.nav-toggle');
    if (toggle) toggle.classList.toggle('collapsed', !hidden);
  }

  function togglePost(header) {
    const body = header.nextElementSibling;
    body.classList.toggle('open');
    header.querySelector('.post-toggle').textContent = body.classList.contains('open') ? '접기' : '펼치기';
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function escQ(str) {
    return (str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  }

  init();
</script>
</body>
</html>
